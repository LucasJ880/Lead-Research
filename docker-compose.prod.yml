services:
  # ─── Caddy Reverse Proxy (auto HTTPS) ──────────────────
  caddy:
    image: caddy:2-alpine
    container_name: lh-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  # ─── PostgreSQL ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-leadharvest}
      POSTGRES_USER: ${POSTGRES_USER:-leadharvest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-leadharvest}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lh-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Next.js Web App ──────────────────────────────────
  app:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=postgresql://${POSTGRES_USER:-leadharvest}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-leadharvest}
    container_name: lh-app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-leadharvest}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-leadharvest}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      SCRAPER_API_URL: http://scraper-api:8001
      SCRAPER_API_KEY: ${SCRAPER_API_KEY}
      QINGYAN_ENABLED: ${QINGYAN_ENABLED:-false}
      QINGYAN_API_BASE: ${QINGYAN_API_BASE:-}
      QINGYAN_API_TOKEN: ${QINGYAN_API_TOKEN:-}
      QINGYAN_WEBHOOK_SECRET: ${QINGYAN_WEBHOOK_SECRET:-}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Python Scraper API ────────────────────────────────
  scraper-api:
    build:
      context: ./services/scraper
      dockerfile: Dockerfile
    container_name: lh-scraper-api
    restart: unless-stopped
    expose:
      - "8001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-leadharvest}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-leadharvest}
      REDIS_URL: redis://redis:6379/0
      SCRAPER_API_KEY: ${SCRAPER_API_KEY}
      AGENT_API_KEY: ${AGENT_API_KEY:-${SCRAPER_API_KEY}}
      MERX_EMAIL: ${MERX_EMAIL}
      MERX_PASSWORD: ${MERX_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_TRANSLATE_API_KEY: ${GOOGLE_TRANSLATE_API_KEY:-}
      QINGYAN_API_BASE: ${QINGYAN_API_BASE:-}
      QINGYAN_API_TOKEN: ${QINGYAN_API_TOKEN:-}
      QINGYAN_ENABLED: ${QINGYAN_ENABLED:-false}
      DEFAULT_RATE_LIMIT_SECONDS: ${DEFAULT_RATE_LIMIT_SECONDS:-3}
      DEFAULT_USER_AGENT: ${DEFAULT_USER_AGENT:-LeadHarvest/1.0}
      RESPECT_ROBOTS_TXT: "true"
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Celery Worker ─────────────────────────────────────
  scraper-worker:
    build:
      context: ./services/scraper
      dockerfile: Dockerfile
    container_name: lh-scraper-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-leadharvest}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-leadharvest}
      REDIS_URL: redis://redis:6379/0
      SCRAPER_API_KEY: ${SCRAPER_API_KEY}
      MERX_EMAIL: ${MERX_EMAIL}
      MERX_PASSWORD: ${MERX_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_TRANSLATE_API_KEY: ${GOOGLE_TRANSLATE_API_KEY:-}
      QINGYAN_API_BASE: ${QINGYAN_API_BASE:-}
      QINGYAN_API_TOKEN: ${QINGYAN_API_TOKEN:-}
      QINGYAN_ENABLED: ${QINGYAN_ENABLED:-false}
      DEFAULT_RATE_LIMIT_SECONDS: ${DEFAULT_RATE_LIMIT_SECONDS:-3}
      DEFAULT_USER_AGENT: ${DEFAULT_USER_AGENT:-LeadHarvest/1.0}
      RESPECT_ROBOTS_TXT: "true"
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A src.tasks.celery_app worker --loglevel=info --concurrency=2

  # ─── Celery Beat Scheduler ─────────────────────────────
  scraper-beat:
    build:
      context: ./services/scraper
      dockerfile: Dockerfile
    container_name: lh-scraper-beat
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-leadharvest}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-leadharvest}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A src.tasks.celery_app beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
