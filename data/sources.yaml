# ═══════════════════════════════════════════════════════════════════════
# LeadHarvest — North America Tender Source Registry
# ═══════════════════════════════════════════════════════════════════════
#
# Master registry of public procurement data sources for the LeadHarvest
# crawl pipeline. Every entry describes a single publicly accessible
# procurement portal, bid listing, or tender notification page.
#
# SAFETY RULES
#   - Every URL listed here MUST be publicly accessible without login.
#   - No sources requiring authentication, CAPTCHA, or paywalls.
#   - All crawlers must respect robots.txt and rate limits.
#   - This registry is for public information discovery only.
#
# ADDING A NEW SOURCE
#   1. Append an entry to this file following the field schema below.
#   2. Run `python run_pipeline.py --sync-sources` to register it in the DB.
#   3. If the GenericTenderParser cannot handle the HTML structure, create
#      a custom parser in services/scraper/src/parsers/<source_id>.py.
#
# FIELD SCHEMA
#   source_id           Unique snake_case key (lookup key for parsers)
#   source_name         Human-readable display name
#   country             "CA" or "US"
#   region              Province/state abbreviation, or "National"
#   organization_type   Category of the issuing body (see list below)
#   source_type         One of: bid_portal, municipal, school_board,
#                       housing_authority, university, hospital,
#                       construction, aggregator, other
#   base_url            Root URL of the procurement portal
#   listing_pattern     Page type: tenders, bids, rfp, solicitations, procurement
#   parser_class        Python class in services/scraper/src/parsers/
#   crawl_frequency     One of: hourly, daily, weekly, manual
#   active              Whether the source should be crawled on schedule
#   notes               Special considerations for this source
#   crawl_config        Source-specific crawler configuration
#
# ORGANIZATION TYPES
#   federal_government      National-level procurement
#   provincial_government   Canadian provincial procurement
#   state_government        US state-level procurement
#   municipal_government    City / town procurement
#   county_government       US county procurement
#   regional_government     Regional municipality or district
#   school_board            K-12 school board / school district
#   university              Post-secondary institution
#   housing_authority       Public / social housing provider
#   hospital_system         Public healthcare facility
#   construction_industry   Private construction bid aggregator
#   aggregator              Multi-jurisdiction bid aggregator
#
# SOURCE COUNT: 112 sources
#   Canada:  47 sources across 7 provinces + national
#   US:      65 sources across 9 states + national
#
# ═══════════════════════════════════════════════════════════════════════

sources:

  # ═══════════════════════════════════════════════════════════════════
  #  SECTION 1 — NATIONAL AGGREGATORS
  # ═══════════════════════════════════════════════════════════════════

  # ─── Canadian National ─────────────────────────────────────────────

  - source_id: merx
    source_name: "MERX Canadian Public Tenders"
    country: CA
    region: National
    organization_type: aggregator
    source_type: aggregator
    base_url: "https://www.merx.com"
    listing_pattern: tenders
    parser_class: GenericTenderParser
    crawl_frequency: daily
    active: true
    notes: >
      Canada's largest electronic tendering service. Aggregates federal,
      provincial, and municipal procurement notices. Public listings
      accessible without login.
    crawl_config:
      listing_url: "/search?query=window+coverings+blinds&page={page}"
      pagination: { type: page_param, param: page, max_pages: 10 }
      rate_limit_seconds: 3

  - source_id: government_bids_ca
